<style>
  /* The Navigation Bar */
  .top-nav {
    display: flex;             /* Turns on Flexbox */
    justify-content: center;    /* Centers the group of links */
    flex-direction: row;      /* Forces children into a horizontal row */
    align-items: center;        /* Vertically aligns text in the bar */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: #159957; /* Matches Cayman green */
    background-image: linear-gradient(120deg, #155799, #159957);
    color: blue;
    padding: 10px 0;
    z-index: 9999;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .top-nav a {
    
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;
  }

  .top-nav a:hover {
    text-decoration: underline;
  }

  /* Prevent content from hiding behind the navbar */
  body {
    padding-top: 50px;
  }
</style>
